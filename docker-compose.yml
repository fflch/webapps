services:
  webapps:
    image: webapps
    container_name: webapps
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - webapps-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: webapps_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: webapps
      MYSQL_USER: webapps
      MYSQL_PASSWORD: webapps
      MYSQL_ROOT_PASSWORD: webapps
    networks:
      - webapps-network

  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: cursolaravel_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      webapps-network:
        aliases:
          - auth.local

  selenium:
    image: selenium/standalone-chrome
    container_name: webapps_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - webapps-network
    shm_size: 2gb

  gwmariadb:
    image: ghcr.io/fflch/gwmariadb:latest
    container_name: webapps_gwmariadb
    depends_on:
      - mariadb
    networks:
      - webapps-network
    environment:
      TOKEN: 123
      DB_HOST: mariadb
      DB_NAME: webapps
      DB_USER: webapps
      DB_PASS: webapps
      DB_PORT: 3306

  rustfs:
      image: rustfs/rustfs:latest
      container_name: webapps_rustfs
      ports:
        - "9100:9000" # API S3 (para enviar arquivos com PHP)
        - "9101:9001" # Console Web
      environment:
        - RUSTFS_VOLUMES=/data
        - RUSTFS_ADDRESS=0.0.0.0:9000
        - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
        - RUSTFS_CONSOLE_ENABLE=true
        # Defina aqui as chaves de acesso para a API e o Console
        - RUSTFS_ACCESS_KEY=rustfsadmin
        - RUSTFS_SECRET_KEY=rustfsadmin123
      networks:
        - webapps-network

networks:
  webapps-network: